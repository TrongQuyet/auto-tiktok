<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto TikTok Video Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f0f0f;
            --surface: #1a1a2e;
            --surface2: #16213e;
            --accent: #e94560;
            --accent2: #0f3460;
            --text: #eee;
            --text2: #aaa;
            --success: #00c853;
            --border: #2a2a4a;
            --warn: #ff9800;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Header ─────────────────────────── */
        .header {
            background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
            padding: 20px 32px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .header h1 { font-size: 22px; font-weight: 700; }
        .header h1 span { color: var(--accent); }
        .header .badge {
            background: var(--accent);
            color: #fff;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        /* ── Layout ─────────────────────────── */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 24px;
        }
        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }

        /* ── Card ───────────────────────────── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-body { padding: 20px; }

        /* ── Tabs ───────────────────────────── */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
        }
        .tab {
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            color: var(--text2);
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .tab:hover { color: var(--text); }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* ── Form ───────────────────────────── */
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: var(--text2);
            font-weight: 500;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus,
        .form-group select:focus { border-color: var(--accent); }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
        }
        .checkbox-group label { font-size: 14px; cursor: pointer; }

        /* ── Buttons ────────────────────────── */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            width: 100%;
            justify-content: center;
        }
        .btn-primary:hover { background: #d63451; }
        .btn-primary:disabled { background: #555; cursor: not-allowed; }
        .btn-stop {
            background: var(--warn);
            color: #000;
            width: 100%;
            justify-content: center;
            margin-top: 8px;
        }
        .btn-stop:hover { background: #e68a00; }
        .btn-sm { padding: 6px 14px; font-size: 12px; border-radius: 6px; }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
        .btn-upload { background: var(--accent2); color: #fff; }
        .btn-upload:hover { background: #1a4a8a; }

        /* ── Progress ───────────────────────── */
        .progress-container { margin: 16px 0; }
        .progress-bar {
            height: 6px;
            background: var(--bg);
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #ff6b81);
            border-radius: 3px;
            transition: width 0.5s ease;
            width: 0%;
        }
        .progress-text {
            margin-top: 8px;
            font-size: 13px;
            color: var(--text2);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ── Batch Stats ────────────────────── */
        .batch-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 12px;
        }
        .stat-box {
            background: var(--bg);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }
        .stat-box .stat-value {
            font-size: 24px;
            font-weight: 700;
        }
        .stat-box .stat-label {
            font-size: 11px;
            color: var(--text2);
            margin-top: 2px;
        }
        .stat-value.success { color: var(--success); }
        .stat-value.failed { color: #f66; }
        .stat-value.total { color: var(--accent); }

        /* ── Log Console ────────────────────── */
        .log-console {
            background: #0a0a0a;
            border-radius: 8px;
            padding: 12px 16px;
            height: 400px;
            overflow-y: auto;
            font-family: 'Cascadia Code', 'Fira Code', monospace;
            font-size: 12px;
            line-height: 1.6;
            color: #8f8;
        }
        .log-console .log-error { color: #f66; }
        .log-console .log-warn { color: #fd0; }
        .log-console .log-info { color: #8f8; }

        /* ── Content Preview ────────────────── */
        .content-preview { display: none; margin-top: 16px; }
        .content-preview.active { display: block; }
        .content-preview h4 { font-size: 14px; margin-bottom: 8px; color: var(--accent); }
        .segment {
            background: var(--bg);
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 13px;
            border-left: 3px solid var(--accent);
        }
        .hashtags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .hashtag {
            background: var(--accent2);
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            color: #8af;
        }

        /* ── Video List ─────────────────────── */
        .video-list { list-style: none; }
        .video-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .video-item:last-child { border-bottom: none; }
        .video-info h4 { font-size: 14px; font-weight: 500; }
        .video-info span { font-size: 12px; color: var(--text2); }
        .video-actions { display: flex; gap: 6px; }

        /* ── Subtitle Preview ───────────────── */
        .sub-preview { max-height: 200px; overflow-y: auto; margin-top: 12px; }
        .sub-row {
            display: grid;
            grid-template-columns: 60px 1fr 1fr;
            gap: 8px;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
        }
        .sub-row .sub-time { color: var(--accent); font-family: monospace; }
        .sub-row .sub-orig { color: var(--text2); }
        .sub-row .sub-trans { color: var(--text); }

        /* ── Upload Area ────────────────────── */
        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s;
            margin-bottom: 16px;
        }
        .upload-area:hover { border-color: var(--accent); }
        .upload-area.dragover { border-color: var(--accent); background: rgba(233,69,96,0.05); }
        .upload-area p { color: var(--text2); font-size: 13px; margin-top: 8px; }
        .upload-area .filename { color: var(--success); font-weight: 600; font-size: 14px; }

        /* ── Video Player Modal ─────────────── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: var(--surface);
            border-radius: 12px;
            padding: 20px;
            max-width: 400px;
            width: 90%;
            position: relative;
        }
        .modal-content video { width: 100%; border-radius: 8px; max-height: 70vh; }
        .modal-close {
            position: absolute;
            top: -12px;
            right: -12px;
            background: var(--accent);
            border: none;
            color: #fff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Status Indicator ───────────────── */
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .status-dot.idle { background: var(--text2); }
        .status-dot.running { background: var(--accent); animation: pulse 1s infinite; }
        .status-dot.done { background: var(--success); }
        .status-dot.error { background: #f66; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--text2); }
        .empty-state p { font-size: 14px; }
        .right-col { display: flex; flex-direction: column; gap: 24px; }
    </style>
</head>
<body>

<div class="header">
    <h1><span>Auto</span> TikTok Video Generator</h1>
    <span class="badge" id="statusBadge">IDLE</span>
    <button class="btn btn-sm btn-outline" id="notifBtn" onclick="toggleNotif()" style="margin-left:auto;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        <span id="notifLabel">Notification: OFF</span>
    </button>
</div>

<div class="container">
    <!-- LEFT COLUMN -->
    <div class="left-col">
        <div class="card">
            <!-- Tabs -->
            <div class="tabs">
                <div class="tab active" onclick="switchTab('single')">Single Video</div>
                <div class="tab" onclick="switchTab('batch')">Batch Generate</div>
                <div class="tab" onclick="switchTab('subtitle')">Phụ Đề</div>
            </div>

            <!-- Single Video Tab -->
            <div class="tab-content active" id="tab-single">
                <div class="card-body">
                    <!-- Mode Toggle -->
                    <div style="display:flex; gap:8px; margin-bottom:16px;">
                        <button class="btn btn-sm" id="modeNiche" onclick="setMode('niche')" style="flex:1; background:var(--accent); color:#fff;">Niche / Topic</button>
                        <button class="btn btn-sm btn-outline" id="modePrompt" onclick="setMode('prompt')" style="flex:1;">Custom Prompt</button>
                    </div>

                    <!-- Niche Mode -->
                    <div id="nicheMode">
                        <div class="form-group">
                            <label>Niche / Topic</label>
                            <input type="text" id="nicheInput" value="motivation" placeholder="vd: motivation, fun facts, life tips">
                        </div>
                    </div>

                    <!-- Prompt Mode -->
                    <div id="promptMode" style="display:none;">
                        <div class="form-group">
                            <label>Nhập kịch bản video (mỗi dòng = 1 đoạn voiceover)</label>
                            <textarea id="promptInput" rows="6" placeholder="Dòng 1: Bạn có biết mật ong không bao giờ hỏng?&#10;Dòng 2: Các nhà khảo cổ tìm thấy mật ong 3000 năm tuổi...&#10;Dòng 3: ..." style="width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;resize:vertical;outline:none;font-family:inherit;"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Caption TikTok</label>
                            <input type="text" id="promptCaption" placeholder="Caption cho video" value="">
                        </div>
                        <div class="form-group">
                            <label>Hashtags (cách nhau bởi dấu cách)</label>
                            <input type="text" id="promptHashtags" placeholder="#fyp #viral #trending" value="#fyp #viral #trending">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>TTS Voice</label>
                            <select id="voiceSelect">
                                <option value="">Default (from .env)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Kiểu phụ đề</label>
                            <select id="subtitleStyle">
                                <option value="karaoke">Karaoke (từng chữ)</option>
                                <option value="static">Tĩnh (hiện hết)</option>
                            </select>
                        </div>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="uploadCheck">
                        <label for="uploadCheck">Upload to TikTok sau khi tạo</label>
                    </div>
                    <button class="btn btn-primary" id="generateBtn" onclick="startGenerate()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                        Tạo Video
                    </button>
                </div>
            </div>

            <!-- Subtitle Tab -->
            <div class="tab-content" id="tab-subtitle">
                <div class="card-body">
                    <div class="upload-area" id="uploadArea" onclick="document.getElementById('videoFile').click()">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--text2)" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                        <p id="uploadLabel">Kéo thả video hoặc nhấn để chọn file</p>
                        <input type="file" id="videoFile" accept="video/*" style="display:none" onchange="onFileSelected(this)">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Ngôn ngữ gốc</label>
                            <select id="sourceLang">
                                <option value="zh">Tiếng Trung</option>
                                <option value="ja">Tiếng Nhật</option>
                                <option value="ko">Tiếng Hàn</option>
                                <option value="en">Tiếng Anh</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Dịch sang</label>
                            <select id="targetLang">
                                <option value="vi">Tiếng Việt</option>
                                <option value="en">Tiếng Anh</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Cỡ chữ phụ đề</label>
                        <input type="number" id="subFontSize" value="18" min="12" max="36">
                    </div>

                    <!-- Dubbing Options -->
                    <div class="checkbox-group">
                        <input type="checkbox" id="enableDub">
                        <label for="enableDub">Lồng tiếng Việt (Dubbing)</label>
                    </div>
                    <div id="dubOptions" style="display:none;">
                        <div class="form-group">
                            <label>Giọng lồng tiếng</label>
                            <select id="dubVoiceSelect">
                                <option value="vi-VN-NamMinhNeural">Nam Minh (Nam)</option>
                                <option value="vi-VN-HoaiMyNeural">Hoài My (Nữ)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Âm lượng gốc (0 = tắt, 1 = giữ nguyên)</label>
                            <input type="range" id="originalVolume" min="0" max="1" step="0.05" value="0.1"
                                style="width:100%;accent-color:var(--accent);">
                            <span style="font-size:12px;color:var(--text2);" id="volumeLabel">10%</span>
                        </div>
                    </div>

                    <button class="btn btn-primary" id="subtitleBtn" onclick="startSubtitle()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="14" x2="23" y2="14"/></svg>
                        Thêm Phụ Đề
                    </button>

                    <!-- Subtitle Progress -->
                    <div id="subProgressArea" style="display:none; margin-top:16px;">
                        <div class="progress-bar"><div class="progress-fill" id="subProgressFill"></div></div>
                        <div class="progress-text">
                            <span class="status-dot running" id="subStatusDot"></span>
                            <span id="subStatusText">Starting...</span>
                        </div>
                    </div>

                    <!-- Subtitle Preview -->
                    <div id="subPreview" style="display:none; margin-top:16px;">
                        <h4 style="font-size:13px; color:var(--accent); margin-bottom:8px;">Bản dịch:</h4>
                        <div class="sub-preview" id="subPreviewList"></div>
                    </div>
                </div>
            </div>

            <!-- Batch Tab -->
            <div class="tab-content" id="tab-batch">
                <div class="card-body">
                    <div class="form-group">
                        <label>Niches (mỗi dòng 1 niche, sẽ xoay vòng)</label>
                        <textarea id="batchNiches" rows="3" style="width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;resize:vertical;outline:none;">motivation
fun facts
life tips</textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Số lượng video (1-20)</label>
                            <input type="number" id="batchCount" value="5" min="1" max="20">
                        </div>
                        <div class="form-group">
                            <label>Workers song song (1-4)</label>
                            <input type="number" id="batchWorkers" value="2" min="1" max="4">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>TTS Voice</label>
                            <select id="batchVoiceSelect">
                                <option value="">Default (from .env)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Kiểu phụ đề</label>
                            <select id="batchSubtitleStyle">
                                <option value="karaoke">Karaoke (từng chữ)</option>
                                <option value="static">Tĩnh (hiện hết)</option>
                            </select>
                        </div>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="batchUploadCheck">
                        <label for="batchUploadCheck">Upload to TikTok sau mỗi video</label>
                    </div>
                    <button class="btn btn-primary" id="batchBtn" onclick="startBatch()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                        Bắt đầu Batch
                    </button>
                </div>
            </div>

            <!-- Progress + Stats (shared) -->
            <div class="card-body" id="progressArea" style="display:none; border-top: 1px solid var(--border);">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text">
                    <span class="status-dot running" id="statusDot"></span>
                    <span id="statusText">Starting...</span>
                </div>
                <div class="batch-stats" id="batchStats" style="display:none;">
                    <div class="stat-box">
                        <div class="stat-value success" id="statCompleted">0</div>
                        <div class="stat-label">Xong</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value failed" id="statFailed">0</div>
                        <div class="stat-label">Lỗi</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value total" id="statTotal">0</div>
                        <div class="stat-label">Tổng</div>
                    </div>
                </div>
                <button class="btn btn-stop" id="stopBtn" onclick="stopBatch()" style="display:none;">
                    Dừng lại
                </button>
            </div>

            <!-- Content Preview -->
            <div class="card-body content-preview" id="contentPreview" style="border-top: 1px solid var(--border);">
                <h4 id="contentTitle"></h4>
                <div id="segmentsList"></div>
                <p style="margin-top:10px; font-size:13px; color:var(--text2);" id="contentCaption"></p>
                <div class="hashtags" id="hashtagsList"></div>
            </div>
        </div>

        <!-- Video Library -->
        <div class="card" style="margin-top: 24px;">
            <div class="card-header">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2"/><path d="M10 8l6 4-6 4V8z"/></svg>
                Video Library
                <button class="btn btn-sm btn-outline" onclick="loadVideos()" style="margin-left:auto;">Refresh</button>
            </div>
            <div class="card-body" id="videoListArea">
                <div class="empty-state"><p>Chưa có video. Tạo video ở trên!</p></div>
            </div>
        </div>
    </div>

    <!-- RIGHT COLUMN: Logs -->
    <div class="right-col">
        <div class="card" style="flex:1;">
            <div class="card-header">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
                Live Logs
                <button class="btn btn-sm btn-outline" onclick="clearLogs()" style="margin-left:auto;">Clear</button>
            </div>
            <div class="card-body">
                <div class="log-console" id="logConsole">
                    <div class="log-info">Waiting for connection...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Video Player Modal -->
<div class="modal-overlay" id="videoModal">
    <div class="modal-content">
        <button class="modal-close" onclick="closeModal()">&times;</button>
        <video id="videoPlayer" controls></video>
    </div>
</div>

<script>
    const logConsole = document.getElementById('logConsole');
    const progressArea = document.getElementById('progressArea');
    const progressFill = document.getElementById('progressFill');
    const statusText = document.getElementById('statusText');
    const statusDot = document.getElementById('statusDot');
    const statusBadge = document.getElementById('statusBadge');
    const generateBtn = document.getElementById('generateBtn');
    const batchBtn = document.getElementById('batchBtn');
    const contentPreview = document.getElementById('contentPreview');
    const batchStats = document.getElementById('batchStats');
    const stopBtn = document.getElementById('stopBtn');

    let selectedFile = null;

    // ── Tabs ──────────────────────────────────────────────────────
    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(`tab-${tab}`).classList.add('active');
        const idx = {single: 1, batch: 2, subtitle: 3}[tab] || 1;
        document.querySelector(`.tab:nth-child(${idx})`).classList.add('active');
    }

    // ── WebSocket ──────────────────────────────────────────────────
    let ws;
    function connectWS() {
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${location.host}/ws`);
        ws.onopen = () => addLog('Connected to server', 'info');
        ws.onclose = () => {
            addLog('Disconnected. Reconnecting...', 'warn');
            setTimeout(connectWS, 2000);
        };
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (data.type === 'log') {
                const level = data.message.includes('[ERROR]') ? 'error'
                    : data.message.includes('[WARNING]') ? 'warn' : 'info';
                addLog(data.message, level);
            }
            if (data.type === 'status') updateStatus(data);
            if (data.type === 'content') showContentPreview(data);
            if (data.type === 'subtitle_status') updateSubtitleStatus(data);
            if (data.type === 'subtitle_preview') showSubtitlePreview(data);
        };
    }

    function addLog(msg, level = 'info') {
        const div = document.createElement('div');
        div.className = `log-${level}`;
        div.textContent = msg;
        logConsole.appendChild(div);
        logConsole.scrollTop = logConsole.scrollHeight;
    }

    function clearLogs() { logConsole.innerHTML = ''; }

    // ── Status Updates ─────────────────────────────────────────────
    function updateStatus(data) {
        progressArea.style.display = 'block';
        progressFill.style.width = data.progress + '%';
        statusText.textContent = data.status;

        // Show batch stats if total > 1
        if (data.total > 1) {
            batchStats.style.display = 'grid';
            document.getElementById('statCompleted').textContent = data.completed || 0;
            document.getElementById('statFailed').textContent = data.failed || 0;
            document.getElementById('statTotal').textContent = data.total || 0;
        }

        if (data.running) {
            statusDot.className = 'status-dot running';
            statusBadge.textContent = data.total > 1
                ? `BATCH ${data.completed || 0}/${data.total}`
                : 'RUNNING';
            statusBadge.style.background = '#e94560';
            generateBtn.disabled = true;
            batchBtn.disabled = true;
            stopBtn.style.display = data.total > 1 ? 'flex' : 'none';
        } else if (data.error) {
            statusDot.className = 'status-dot error';
            statusBadge.textContent = 'ERROR';
            statusBadge.style.background = '#f66';
            generateBtn.disabled = false;
            batchBtn.disabled = false;
            stopBtn.style.display = 'none';
        } else {
            statusDot.className = 'status-dot done';
            statusBadge.textContent = 'DONE';
            statusBadge.style.background = '#00c853';
            generateBtn.disabled = false;
            batchBtn.disabled = false;
            stopBtn.style.display = 'none';
            loadVideos();
            if (data.total > 1) {
                sendNotification('Batch hoàn thành!', `${data.completed}/${data.total} video đã tạo xong`);
            } else {
                sendNotification('Video đã tạo xong!', data.status);
            }
        }
    }

    // ── Content Preview ────────────────────────────────────────────
    function showContentPreview(data) {
        contentPreview.classList.add('active');
        const prefix = data.video_num ? `[Video ${data.video_num}] ` : '';
        document.getElementById('contentTitle').textContent = prefix + data.title;
        document.getElementById('contentCaption').textContent = data.caption;
        document.getElementById('segmentsList').innerHTML = data.segments.map((s, i) =>
            `<div class="segment"><strong>${i + 1}.</strong> ${s}</div>`
        ).join('');
        document.getElementById('hashtagsList').innerHTML = data.hashtags.map(h =>
            `<span class="hashtag">${h}</span>`
        ).join('');
    }

    // ── Mode Toggle ─────────────────────────────────────────────
    let currentMode = 'niche';
    function setMode(mode) {
        currentMode = mode;
        document.getElementById('nicheMode').style.display = mode === 'niche' ? 'block' : 'none';
        document.getElementById('promptMode').style.display = mode === 'prompt' ? 'block' : 'none';
        document.getElementById('modeNiche').className = mode === 'niche' ? 'btn btn-sm' : 'btn btn-sm btn-outline';
        document.getElementById('modePrompt').className = mode === 'prompt' ? 'btn btn-sm' : 'btn btn-sm btn-outline';
        document.getElementById('modeNiche').style.background = mode === 'niche' ? 'var(--accent)' : '';
        document.getElementById('modeNiche').style.color = mode === 'niche' ? '#fff' : '';
        document.getElementById('modePrompt').style.background = mode === 'prompt' ? 'var(--accent)' : '';
        document.getElementById('modePrompt').style.color = mode === 'prompt' ? '#fff' : '';
    }

    // ── Single Generate ────────────────────────────────────────────
    async function startGenerate() {
        const uploadToTiktok = document.getElementById('uploadCheck').checked;
        const voice = document.getElementById('voiceSelect').value;

        contentPreview.classList.remove('active');
        batchStats.style.display = 'none';

        let body;

        const subtitleStyle = document.getElementById('subtitleStyle').value;

        if (currentMode === 'prompt') {
            const promptText = document.getElementById('promptInput').value.trim();
            if (!promptText) return alert('Vui lòng nhập kịch bản video');

            const segments = promptText.split('\n').map(s => s.trim()).filter(s => s);
            if (segments.length === 0) return alert('Cần ít nhất 1 dòng kịch bản');

            const caption = document.getElementById('promptCaption').value.trim() || '';
            const hashtagsRaw = document.getElementById('promptHashtags').value.trim();
            const hashtags = hashtagsRaw ? hashtagsRaw.split(/\s+/).filter(h => h) : ['#fyp'];

            body = {
                mode: 'prompt',
                segments: segments,
                caption: caption,
                hashtags: hashtags,
                upload_to_tiktok: uploadToTiktok,
                subtitle_style: subtitleStyle,
            };
        } else {
            const niche = document.getElementById('nicheInput').value.trim();
            if (!niche) return alert('Vui lòng nhập niche/topic');
            body = {
                niche: niche,
                upload_to_tiktok: uploadToTiktok,
                subtitle_style: subtitleStyle,
            };
        }

        if (voice) body.tts_voice = voice;

        const res = await fetch('/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });
        const data = await res.json();
        if (data.error) alert(data.error);
    }

    // ── Batch Generate ─────────────────────────────────────────────
    async function startBatch() {
        const nichesText = document.getElementById('batchNiches').value.trim();
        if (!nichesText) return alert('Vui lòng nhập ít nhất 1 niche');

        const niches = nichesText.split('\n').map(n => n.trim()).filter(n => n);
        const count = parseInt(document.getElementById('batchCount').value) || 5;
        const workers = parseInt(document.getElementById('batchWorkers').value) || 2;

        const body = {
            niches,
            count: Math.min(Math.max(count, 1), 20),
            workers: Math.min(Math.max(workers, 1), 4),
            subtitle_style: document.getElementById('batchSubtitleStyle').value,
            upload_to_tiktok: document.getElementById('batchUploadCheck').checked,
        };
        const voice = document.getElementById('batchVoiceSelect').value;
        if (voice) body.tts_voice = voice;

        contentPreview.classList.remove('active');

        const res = await fetch('/api/batch', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });
        const data = await res.json();
        if (data.error) alert(data.error);
    }

    // ── Stop Batch ─────────────────────────────────────────────────
    async function stopBatch() {
        if (!confirm('Dừng batch? Video đang tạo sẽ hoàn thành, nhưng video tiếp theo sẽ không bắt đầu.')) return;
        await fetch('/api/stop', { method: 'POST' });
    }

    // ── Video Library ──────────────────────────────────────────────
    async function loadVideos() {
        const res = await fetch('/api/videos');
        const videos = await res.json();
        const area = document.getElementById('videoListArea');

        if (!videos.length) {
            area.innerHTML = '<div class="empty-state"><p>Chưa có video. Tạo video ở trên!</p></div>';
            return;
        }

        area.innerHTML = `<ul class="video-list">${videos.map(v => `
            <li class="video-item">
                <div class="video-info">
                    <h4>${v.name}</h4>
                    <span>${v.size_mb} MB &middot; ${v.created}</span>
                </div>
                <div class="video-actions">
                    <button class="btn btn-sm btn-outline" onclick="playVideo('${v.url}')">Play</button>
                    <a class="btn btn-sm btn-outline" href="${v.url}" download>Download</a>
                    <button class="btn btn-sm btn-upload" onclick="uploadVideo('${v.name}')">TikTok</button>
                </div>
            </li>
        `).join('')}</ul>`;
    }

    function playVideo(url) {
        document.getElementById('videoPlayer').src = url;
        document.getElementById('videoModal').classList.add('active');
    }
    function closeModal() {
        const player = document.getElementById('videoPlayer');
        player.pause(); player.src = '';
        document.getElementById('videoModal').classList.remove('active');
    }
    async function uploadVideo(filename) {
        if (!confirm(`Upload "${filename}" lên TikTok?`)) return;
        const res = await fetch(`/api/upload/${filename}`, { method: 'POST' });
        const data = await res.json();
        if (data.error) alert(data.error);
    }

    // ── Load Voices ────────────────────────────────────────────────
    async function loadVoices() {
        try {
            const res = await fetch('/api/voices');
            const voices = await res.json();
            if (Array.isArray(voices)) {
                ['voiceSelect', 'batchVoiceSelect'].forEach(id => {
                    const select = document.getElementById(id);
                    voices.forEach(v => {
                        const opt = document.createElement('option');
                        opt.value = v.name;
                        opt.textContent = `${v.name} (${v.gender}, ${v.locale})`;
                        select.appendChild(opt);
                    });
                });
            }
        } catch (e) { console.error('Failed to load voices:', e); }
    }

    // ── Subtitle Feature ─────────────────────────────────────────
    function onFileSelected(input) {
        if (input.files.length > 0) {
            selectedFile = input.files[0];
            document.getElementById('uploadLabel').innerHTML =
                `<span class="filename">${selectedFile.name}</span><br>(${(selectedFile.size/1024/1024).toFixed(1)} MB)`;
        }
    }

    // Drag & drop
    const uploadArea = document.getElementById('uploadArea');
    if (uploadArea) {
        uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                selectedFile = e.dataTransfer.files[0];
                document.getElementById('uploadLabel').innerHTML =
                    `<span class="filename">${selectedFile.name}</span><br>(${(selectedFile.size/1024/1024).toFixed(1)} MB)`;
            }
        });
    }

    // Dubbing toggle
    document.getElementById('enableDub').addEventListener('change', function() {
        document.getElementById('dubOptions').style.display = this.checked ? 'block' : 'none';
    });
    document.getElementById('originalVolume').addEventListener('input', function() {
        document.getElementById('volumeLabel').textContent = Math.round(this.value * 100) + '%';
    });

    async function startSubtitle() {
        if (!selectedFile) return alert('Vui lòng chọn video trước');

        const formData = new FormData();
        formData.append('video', selectedFile);
        formData.append('source_lang', document.getElementById('sourceLang').value);
        formData.append('target_lang', document.getElementById('targetLang').value);
        formData.append('font_size', document.getElementById('subFontSize').value);

        // Dubbing options
        const dubEnabled = document.getElementById('enableDub').checked;
        formData.append('enable_dub', dubEnabled ? 'true' : 'false');
        if (dubEnabled) {
            formData.append('dub_voice', document.getElementById('dubVoiceSelect').value);
            formData.append('original_volume', document.getElementById('originalVolume').value);
        }

        document.getElementById('subtitleBtn').disabled = true;
        document.getElementById('subPreview').style.display = 'none';

        const res = await fetch('/api/subtitle', { method: 'POST', body: formData });
        const data = await res.json();
        if (data.error) {
            alert(data.error);
            document.getElementById('subtitleBtn').disabled = false;
        }
    }

    function updateSubtitleStatus(data) {
        const area = document.getElementById('subProgressArea');
        area.style.display = 'block';
        document.getElementById('subProgressFill').style.width = data.progress + '%';
        document.getElementById('subStatusText').textContent = data.status;

        if (data.running) {
            document.getElementById('subStatusDot').className = 'status-dot running';
            document.getElementById('subtitleBtn').disabled = true;
        } else {
            document.getElementById('subStatusDot').className = data.error ? 'status-dot error' : 'status-dot done';
            document.getElementById('subtitleBtn').disabled = false;
            if (!data.error) {
                loadVideos();
                sendNotification('Phụ đề hoàn thành!', data.status);
            }
        }
    }

    function showSubtitlePreview(data) {
        const container = document.getElementById('subPreview');
        container.style.display = 'block';
        const list = document.getElementById('subPreviewList');
        list.innerHTML = data.segments.map(s => {
            const time = new Date(s.start * 1000).toISOString().substr(14, 5);
            return `<div class="sub-row">
                <span class="sub-time">${time}</span>
                <span class="sub-orig">${s.original}</span>
                <span class="sub-trans">${s.text}</span>
            </div>`;
        }).join('');
    }

    // ── Chrome Notifications ──────────────────────────────────────
    let notifEnabled = false;

    function updateNotifUI() {
        const btn = document.getElementById('notifBtn');
        const label = document.getElementById('notifLabel');
        if (notifEnabled) {
            label.textContent = 'Notification: ON';
            btn.style.borderColor = '#00c853';
            btn.style.color = '#00c853';
        } else {
            label.textContent = 'Notification: OFF';
            btn.style.borderColor = '';
            btn.style.color = '';
        }
    }

    async function toggleNotif() {
        if (!('Notification' in window)) {
            alert('Trình duyệt không hỗ trợ Notification');
            return;
        }
        if (Notification.permission === 'denied') {
            alert('Notification đã bị chặn. Vào Chrome Settings > Site Settings > Notifications > localhost > Allow');
            return;
        }
        if (notifEnabled) {
            notifEnabled = false;
            updateNotifUI();
            return;
        }
        const perm = await Notification.requestPermission();
        notifEnabled = perm === 'granted';
        updateNotifUI();
        if (notifEnabled) {
            new Notification('Auto TikTok', { body: 'Thông báo đã bật!' });
        }
    }

    function initNotif() {
        if ('Notification' in window && Notification.permission === 'granted') {
            notifEnabled = true;
        }
        updateNotifUI();
    }

    function sendNotification(title, body) {
        if (!notifEnabled) return;
        try {
            const notif = new Notification(title, {
                body: body,
                icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🎬</text></svg>',
                tag: 'auto-tiktok',
            });
            notif.onclick = () => { window.focus(); notif.close(); };
        } catch (e) { console.error('Notification error:', e); }
    }

    // ── Init ───────────────────────────────────────────────────────
    document.getElementById('videoModal').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) closeModal();
    });
    initNotif();
    connectWS();
    loadVoices();
    loadVideos();
</script>
</body>
</html>
